version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  alan_orchestrator:
    build: 
      context: .
      dockerfile: backend/orchestrator/Dockerfile # (Can use standard python:3.11-slim)
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app/backend
      - ./workspace:/app/workspace
    depends_on:
      - postgres
      - redis
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PREFERRED_PROVIDER=${PREFERRED_PROVIDER:-GROQ}
      
  # Subagents exposed internally to Alan
  command_executor:
    build: 
      context: .
      dockerfile: backend/subagents/command_executor/Dockerfile
    volumes:
      - ./workspace:/workspace
      - ./backend:/app/backend
      - C:\:/host_c
    ports:
      - "8001:8001"

  file_operator:
    build: 
      context: .
      dockerfile: backend/subagents/file_operator/Dockerfile
    volumes:
      - ./workspace:/workspace
      - ./backend:/app/backend
      - C:\:/host_c
    ports:
      - "8002:8002"

  code_executor:
    build: 
      context: .
      dockerfile: backend/subagents/code_executor/Dockerfile
    volumes:
      - ./workspace:/app/workspace
      - ./backend:/app/backend
      - C:\:/host_c
    ports:
      - "8003:8003"

  tool_executor:
    build: 
      context: .
      dockerfile: backend/subagents/tool_executor/Dockerfile
    volumes:
      - ./workspace:/app/workspace
      - ./backend:/app/backend
    ports:
      - "8004:8004"
    environment:
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}

  local_executor:
    build: 
      context: .
      dockerfile: backend/subagents/local_executor/Dockerfile
    volumes:
      - ./workspace:/app/workspace
      - ./backend:/app/backend
      - C:\:/host_c
    ports:
      - "8005:8005"

volumes:
  pgdata: