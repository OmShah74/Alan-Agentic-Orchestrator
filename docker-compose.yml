version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  alan_orchestrator:
    build: 
      context: .
      dockerfile: backend/orchestrator/Dockerfile # (Can use standard python:3.11-slim)
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./workspace:/app/workspace
    depends_on:
      - postgres
      - redis
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      
  # Subagents exposed internally to Alan
  command_executor:
    build: ./backend/subagents/command_executor
    volumes:
      - ./workspace:/workspace
    ports:
      - "8001:8001"

  file_operator:
    build: ./backend/subagents/file_operator
    volumes:
      - ./workspace:/workspace
    ports:
      - "8002:8002"

volumes:
  pgdata: